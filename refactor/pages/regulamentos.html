<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emissão de Regulamentos</title>
    <!-- Carrega o arquivo CSS para estilização -->
    <link rel="stylesheet" href="../css/regulamentos.css">
    <!-- Carrega a biblioteca React -->
    <script src="https://unpkg.com/react@17/umd/react.development.js" crossorigin></script>
    <!-- Carrega a biblioteca ReactDOM -->
    <script src="https://unpkg.com/react-dom@17/umd/react-dom.development.js" crossorigin></script>
    <!-- Carrega o Babel para transpilar JSX no navegador -->
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
</head>
<body>
    <!-- O componente React será renderizado dentro desta div -->
    <div id="root"></div>

    <!-- Carrega o componente React (RegulamentosPage.jsx) -->
    <!-- O 'type="text/babel"' indica ao Babel para transpilar este script -->
    <script type="text/babel" src="../js/pages/RegulamentosPage.jsx"></script>
</body>
</html>
